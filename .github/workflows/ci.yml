name: CI pipeline

on:
   push:
    branches: [main]
   pull_request:
    branches: [main]

jobs:
 test:
   runs-on: ubuntu-latest

   steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Run tests
        run: npm test



